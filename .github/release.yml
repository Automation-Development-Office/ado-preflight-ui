changelog:
  exclude:
    labels:
      - ignore-for-release
      - skip-changelog
    authors:
      - dependabot
      - dependabot[bot]

  categories:
    - title: Breaking Changes
      labels:
        - breaking
        - breaking-change

    - title: Features
      labels:
        - feature
        - enhancement

    - title: Bug Fixes
      labels:
        - bug
        - fix

    - title: Documentation
      labels:
        - documentation
        - docs

    - title: CI/CD & Build
      labels:
        - ci
        - build
        - release

    - title: Dependencies
      labels:
        - dependencies

    - title: Other Changes
      labels:
        - "*"
