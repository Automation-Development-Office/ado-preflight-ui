name: Release Container

on:
  release:
    types: [published]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ado-preflight-ui

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set GHCR image name
        run: echo "GHCR_IMAGE=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"

      - name: Generate and update changelog
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api \
            "repos/${{ github.repository }}/releases/generate-notes" \
            -f tag_name="${{ github.event.release.tag_name }}" \
            -f target_commitish="${{ github.event.release.target_commitish }}" \
            --jq .body > changelog.md

          gh release edit "${{ github.event.release.tag_name }}" --notes-file changelog.md

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build container image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Containerfile
          platforms: linux/amd64
          tags: |
            ${{ env.GHCR_IMAGE }}:${{ github.event.release.tag_name }}
            ${{ env.GHCR_IMAGE }}:latest
          push: true
          pull: true
          no-cache: true

      - name: Export amd64 image archive
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Containerfile
          platforms: linux/amd64
          tags: ${{ env.GHCR_IMAGE }}:${{ github.event.release.tag_name }}
          outputs: type=docker,dest=${{ env.IMAGE_NAME }}-${{ github.event.release.tag_name }}-linux-amd64.tar

      - name: Compress image archives
        run: |
          gzip -f "${{ env.IMAGE_NAME }}-${{ github.event.release.tag_name }}-linux-amd64.tar"

      - name: Upload container artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.IMAGE_NAME }}-${{ github.event.release.tag_name }}
          path: ${{ env.IMAGE_NAME }}-${{ github.event.release.tag_name }}-linux-amd64.tar.gz
          retention-days: 90
          if-no-files-found: error

      - name: Attach image to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            "${{ env.IMAGE_NAME }}-${{ github.event.release.tag_name }}-linux-amd64.tar.gz" \
            --clobber
